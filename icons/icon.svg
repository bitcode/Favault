<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="1.5" flood-color="#05254E" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Base / Outer Navy Border -->
  <circle cx="50" cy="50" r="49" fill="#05254E" />

  <!-- Inner Light Blue Ring (Tinted Brand Blue) -->
  <circle cx="50" cy="50" r="44" fill="#D1E3F3" />

  <!-- Primary Brand Blue Inner Circle -->
  <circle cx="50" cy="50" r="33" fill="#468FCD" />

  <!-- Main Vault Mechanism with Shadow -->
  <g filter="url(#shadow)">

    <!-- Vault Spokes -->
    <g stroke="#05254E" stroke-width="5.5" stroke-linecap="round">

      <!-- Long Spokes (North, East, South, West) extending into the light blue ring -->
      <line x1="50" y1="50" x2="50" y2="10" />
      <line x1="50" y1="50" x2="50" y2="10" transform="rotate(90 50 50)" />
      <line x1="50" y1="50" x2="50" y2="10" transform="rotate(180 50 50)" />
      <line x1="50" y1="50" x2="50" y2="10" transform="rotate(270 50 50)" />

      <!-- Short Spokes (NE, SE, SW, NW) staying inside the inner circle -->
      <line x1="50" y1="50" x2="50" y2="22" transform="rotate(45 50 50)" />
      <line x1="50" y1="50" x2="50" y2="22" transform="rotate(135 50 50)" />
      <line x1="50" y1="50" x2="50" y2="22" transform="rotate(225 50 50)" />
      <line x1="50" y1="50" x2="50" y2="22" transform="rotate(315 50 50)" />
    </g>

    <!-- Center Dial Base (Grey 20) -->
    <circle cx="50" cy="50" r="18" fill="#F1F5F9" stroke="#05254E" stroke-width="2.5" />

    <!-- Center Dial Ticks -->
    <g stroke="#05254E" stroke-width="1.5" stroke-linecap="round">
      <line x1="50" y1="33.5" x2="50" y2="36.5" transform="rotate(-60 50 50)" />
      <line x1="50" y1="33.5" x2="50" y2="36.5" transform="rotate(-45 50 50)" />
      <line x1="50" y1="33.5" x2="50" y2="36.5" transform="rotate(-30 50 50)" />
      <line x1="50" y1="33.5" x2="50" y2="36.5" transform="rotate(-15 50 50)" />
      <line x1="50" y1="33.5" x2="50" y2="36.5" transform="rotate(0 50 50)" />
      <line x1="50" y1="33.5" x2="50" y2="36.5" transform="rotate(15 50 50)" />
      <line x1="50" y1="33.5" x2="50" y2="36.5" transform="rotate(30 50 50)" />
      <line x1="50" y1="33.5" x2="50" y2="36.5" transform="rotate(45 50 50)" />
      <line x1="50" y1="33.5" x2="50" y2="36.5" transform="rotate(60 50 50)" />
    </g>

    <!-- Inner Turning Knob (Steel) -->
    <circle cx="50" cy="50" r="8.5" fill="#CBD5E1" stroke="#05254E" stroke-width="2" />

  </g>
</svg>
